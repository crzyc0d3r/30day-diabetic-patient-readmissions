# Driftly web: serve the built SPA and reverse-proxy /api to the backend so the
# browser makes same-origin calls (no CORS). Mirrors the vite dev proxy.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API -> FastAPI backend (compose service name on the shared network).
    location /api/ {
        proxy_pass http://driftly-api:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;          # large reference reads / first compute
        client_max_body_size 64m;         # allow CSV uploads
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
