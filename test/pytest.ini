[pytest]
# Unit-test configuration for the helpers/ package.
#
# `testpaths = test` confines collection to the test tree so pytest never
# wanders into the notebooks, the Airflow DAGs, or the inference container.
# `pythonpath = .` puts the repository root on sys.path, which is what makes
# `from helpers.<module> import ...` resolve to the same package the
# notebooks and DAGs import — the tests exercise the production import path,
# not a copy of it.
testpaths = test
pythonpath = .
addopts = -ra -q --import-mode=importlib
filterwarnings =
    # The scientific stack (sklearn, torch, pandas) emits a steady stream of
    # Deprecation/FutureWarnings that are out of our control and would bury
    # genuine signal. We silence the known-noisy categories rather than each
    # individual message so the suite stays readable.
    ignore::DeprecationWarning
    ignore::FutureWarning
    ignore::UserWarning
