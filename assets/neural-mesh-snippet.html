<!-- =========================================================================
     NEURAL MESH BACKGROUND: Pancreatic Islet / Beta Cell Edition
     Cells with nuclei + insulin granules. Vesicles travel between them.
     Themed for the medi-watch diabetes project. Inspired by NVIDIA Spark.

     This is a self-contained version (no external .js required).
     Paste the three blocks below into any medi-watch style HTML doc.

     PLACEMENT:
       1. Right after <body> → the <canvas> + <style> block
       2. Right before </body> → the <script> block (or anywhere after the canvas)

     The effect is:
       - Sparse glowing node graph
       - Signal particles continuously traveling along the edges (the "talking" feel)
       - Respects your existing --accent CSS variable + data-theme
       - Mouse moves influence the field + spawn occasional bright signals
       - Pauses when the tab is hidden (efficient)
       - Pauses during window resize (prevents jank while dragging)
       - Respects prefers-reduced-motion

     NOTE: neural-mesh-background.js is the maintained source and carries
     the current tuning (slower particle travel, smaller node glows, etc.).
     Prefer loading the external script when possible.
========================================================================= -->

<!-- BLOCK 1: Canvas + Styles (paste immediately after <body>) -->
<canvas id="neural-bg" aria-hidden="true"></canvas>
<style>
  #neural-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: 0.26;                 /* lowered for better text readability */
    mix-blend-mode: screen;
    transition: opacity 180ms ease;
  }
  [data-theme="light"] #neural-bg {
    opacity: 0.12;
    mix-blend-mode: multiply;
  }
  @media (prefers-reduced-motion: reduce) {
    #neural-bg { opacity: 0.18; }
  }
  .shell, aside.nav, .mobile-toggle { position: relative; z-index: 1; }
</style>
